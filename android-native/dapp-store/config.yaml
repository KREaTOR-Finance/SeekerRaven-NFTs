solana_mobile_dapp_publisher_portal:
  google_store_package: ''
  testing_instructions: |
    1. Install a Solana Mobile compatible wallet from the dApp Store.
    2. Open SeekerRavens Mint and connect a wallet.
    3. Complete SIWS login, then mint on the configured devnet release.
    4. Verify holder dashboard, trusted settings links, logout, and delete-account messaging.
